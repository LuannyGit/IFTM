<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <style>
        body {
            background-color: rgb(230, 220, 208);
            text-align: justify;
        }
        form {
            padding: 20px;
        }
        div {
            text-align: center;
        }
        fieldset {
            color: rgb(14, 12, 12);
        }


    </style>
</head>
<body>
    <div>
        <fieldset>
            <legend>Informações Pessoais</legend>
    <form action="" method="get">
        <label for="nome">Nome: </label>
        <input type="text" id="nome"><br>

        <input type="radio" name="x"  value="Masculino">
        <label for="m">Masculino</label>
        <input type="radio" name="x"  value="Feminino">
        <label for="f">Feminino</label><br>

        <label for="estado">Estado Civil: </label>
        <input list="browsers">
        <datalist id="browsers">
            <option value="Casado"></option>
            <option value="Solteiro"></option>
            <option value="Viuvo"></option>
            <option value="Divorciado"></option>
            <option value="Outro"></option>
        </datalist><br>

        <label for="email">E-mail: </label>
        <input type="email" name="email" id=""><br>

        <label for="endereco">Endereço: </label>
        <input type="text" name="endereco" id=""><br>
        <label for="numero">Número:</label>
        <input type="number" name="numero" id="" min="1" max="9999"><br>

        <label for="data">Data de nascimento: </label>
        <input type="date" id="data"><br>

        <label for="number">Telefone: </label>
        <input type="tel" name="number" id="number" placeholder="(11) 99999-9999" required><br>
        <label for="pagina">Página Pessoal: </label>
        <input type="url" name="pagina">
        <br>

        <button type="submit">Cadastrar</button>
        <button type="reset">Limpar</button>

    </form>
</fieldset>
</div>
</body>
</html>
